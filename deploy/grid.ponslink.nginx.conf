# Reverse-proxy template for grid.ponslink.com.
# Keep warp.ponslink.com in a separate server block/upstream.

upstream ponswarp_grid_web {
  server 127.0.0.1:4180;
}

upstream ponswarp_grid_coordinator {
  server 127.0.0.1:8788;
}

server {
  listen 443 ssl http2;
  server_name grid.ponslink.com;

  # ssl_certificate /etc/letsencrypt/live/grid.ponslink.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/grid.ponslink.com/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://grid.ponslink.com wss://grid.ponslink.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; worker-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

  location = /healthz {
    proxy_pass http://ponswarp_grid_coordinator/healthz;
  }

  location = /readyz {
    proxy_pass http://ponswarp_grid_coordinator/readyz;
  }

  location = /version.json {
    proxy_pass http://ponswarp_grid_web/version.json;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://grid.ponslink.com wss://grid.ponslink.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; worker-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header Cache-Control "no-cache" always;
  }

  location /metrics {
    allow 127.0.0.1;
    deny all;
    proxy_pass http://ponswarp_grid_coordinator/metrics;
  }

  location /api/grid/v1/ {
    proxy_pass http://ponswarp_grid_coordinator/api/grid/v1/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /ws/grid/ {
    proxy_pass http://ponswarp_grid_coordinator/ws/grid/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 1h;
  }

  location /assets/ {
    proxy_pass http://ponswarp_grid_web/assets/;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://grid.ponslink.com wss://grid.ponslink.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; worker-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
  }

  location / {
    proxy_pass http://ponswarp_grid_web;
    add_header Cache-Control "no-cache" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://grid.ponslink.com wss://grid.ponslink.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; worker-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
  }
}
